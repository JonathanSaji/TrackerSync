<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SUBTRACKR Helper Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        font-size: 0.9rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 10px;
        padding: 6px 12px;
        font-size: 0.9rem;
      }
      .status {
        margin-top: 6px;
        font-size: 0.8rem;
        color: #059669;
      }
    </style>
  </head>
  <body>
    <h1>SUBTRACKR Helper Settings</h1>
    <label>
      Dashboard URL
      <input type="text" id="dashboardUrl" placeholder="http://localhost:5500/HTMLtest.html" />
    </label>
    <button id="saveBtn">Save</button>
    <div class="status" id="status"></div>

    <script>
      const input = document.getElementById("dashboardUrl");
      const statusEl = document.getElementById("status");
      const saveBtn = document.getElementById("saveBtn");

      chrome.storage.sync.get(["dashboardUrl"], (result) => {
        if (result.dashboardUrl) {
          input.value = result.dashboardUrl;
        }
      });

      saveBtn.addEventListener("click", () => {
        const value = input.value.trim();
        chrome.storage.sync.set({ dashboardUrl: value }, () => {
          statusEl.textContent = "Saved.";
          setTimeout(() => (statusEl.textContent = ""), 1500);
        });
      });
    </script>
  </body>
  </html>
